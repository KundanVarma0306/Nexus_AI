# AI Research Assistant - Docker Compose
# Production-ready multi-service configuration

version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: research-assistant-api
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - CHROMA_DB_PATH=/app/database/chroma_db
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      - TOP_K_RESULTS=5
      - CACHE_ENABLED=true
    volumes:
      - chroma_data:/app/database/chroma_db
      - uploads:/app/uploads
      - cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - research-network



networks:
  research-network:
    driver: bridge

volumes:
  chroma_data:
    driver: local
  uploads:
    driver: local
  cache:
    driver: local
